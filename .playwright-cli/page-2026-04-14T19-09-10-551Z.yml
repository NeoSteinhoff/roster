        - heading "Roster is built around memory, timing, and prep." [level=2] [ref=e131]
        - paragraph [ref=e132]: Instead of treating people like leads, Roster treats them like relationships. Save context, keep a touch rhythm, and pull up the right memory before the next dinner, call, or coffee.
      - generic [ref=e133]:
        - article [ref=e134]:
          - paragraph [ref=e135]: Memory
          - heading "Attach meaning to every person." [level=3] [ref=e136]
          - paragraph [ref=e137]: Memories, notes, groups, tags, related people, and social context live together instead of across five tools.
        - article [ref=e138]:
          - paragraph [ref=e139]: Timing
          - heading "Know who needs attention next." [level=3] [ref=e140]
          - paragraph [ref=e141]: Cadence, touch style, birthdays, today queue, this-week queue, and bond health make follow-up feel obvious.
        - article [ref=e142]:
          - paragraph [ref=e143]: Prep
          - heading "Show up informed." [level=3] [ref=e144]
          - paragraph [ref=e145]: Meeting Brief mode gives you the fastest version of who they are, what’s changed, and what matters now.
